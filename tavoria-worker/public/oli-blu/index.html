<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>Scuola d'Estate ☀️</title>
<style>
  :root{
    --bg:#f4f7fb; --card:#ffffff; --ink:#1f2937; --muted:#6b7280;
    --line:#e5e9f0; --shadow:0 6px 24px rgba(20,40,80,.07);
    --radius:18px;
    --good:#16a34a; --good-bg:#e9f9ef; --bad:#dc2626; --bad-bg:#fdeaea;
    --accent:#2563eb; --accent-soft:#e8f0ff;
  }
  /* per-profile accent */
  body.blu{ --accent:#7c5cff; --accent-soft:#efeaff; }
  body.oli{ --accent:#0ea5a3; --accent-soft:#e3f7f6; }
  /* dyslexia-friendly mode */
  body.dys{ --ink:#222; }
  body.dys .readzone{
    font-family:Verdana, Tahoma, sans-serif;
    letter-spacing:.04em; word-spacing:.12em; line-height:1.9;
  }
  body.dys .opt, body.dys .q-text{ font-size:1.18rem; }

  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:860px; margin:0 auto; padding:18px 16px 80px;}
  header.topbar{
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    margin-bottom:18px;
  }
  .topbar h1{font-size:1.25rem; margin:0; flex:1;}
  .pill{
    background:var(--card); border:1px solid var(--line); border-radius:999px;
    padding:6px 12px; font-size:.85rem; color:var(--muted); box-shadow:var(--shadow);
    display:inline-flex; gap:6px; align-items:center;
  }
  .btn{
    border:none; border-radius:12px; padding:11px 16px; font-size:1rem;
    cursor:pointer; font-weight:600; background:var(--accent); color:#fff;
    transition:transform .05s ease, filter .15s;
  }
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:var(--card); color:var(--ink); border:1px solid var(--line);}
  .btn.small{padding:7px 12px; font-size:.85rem;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:20px; margin-bottom:16px;
  }
  .grid{display:grid; gap:14px;}
  @media(min-width:620px){ .grid.two{grid-template-columns:1fr 1fr;} }

  /* ---- profile picker ---- */
  .profiles{display:grid; gap:16px; grid-template-columns:1fr 1fr; margin-top:30px;}
  @media(max-width:540px){ .profiles{grid-template-columns:1fr;} }
  .profile{
    border:2px solid var(--line); border-radius:22px; padding:26px 18px; text-align:center;
    background:var(--card); cursor:pointer; box-shadow:var(--shadow); transition:.15s;
  }
  .profile:hover{transform:translateY(-3px);}
  .profile .ava{font-size:3.2rem; line-height:1;}
  .profile h3{margin:12px 0 4px;}
  .profile p{margin:0; color:var(--muted); font-size:.9rem;}
  .pf-blu{border-color:#cdbdff;}
  .pf-oli{border-color:#9fe3e0;}

  /* ---- menu tiles ---- */
  .tiles{display:grid; gap:14px; grid-template-columns:1fr 1fr;}
  @media(max-width:540px){ .tiles{grid-template-columns:1fr;} }
  .tile{
    border:1px solid var(--line); border-radius:var(--radius); padding:20px; cursor:pointer;
    background:var(--card); box-shadow:var(--shadow); transition:.15s; position:relative;
  }
  .tile:hover{transform:translateY(-2px); border-color:var(--accent);}
  .tile .ico{font-size:2rem;}
  .tile h3{margin:10px 0 4px; font-size:1.1rem;}
  .tile p{margin:0; color:var(--muted); font-size:.88rem;}
  .tile .done-badge{
    position:absolute; top:14px; right:14px; background:var(--good-bg); color:var(--good);
    border-radius:999px; font-size:.75rem; padding:3px 9px; font-weight:700; display:none;
  }
  .tile.done .done-badge{display:inline-block;}
  .lvl-row{display:flex; align-items:center; gap:8px; margin-top:12px;}
  .lvl-bar{flex:1; height:8px; background:var(--line); border-radius:999px; overflow:hidden;}
  .lvl-bar > i{display:block; height:100%; background:var(--accent); width:0; transition:width .4s;}
  .lvl-num{font-size:.74rem; color:var(--muted); font-weight:800; white-space:nowrap;}

  /* ---- quiz ---- */
  .q-text{font-size:1.3rem; font-weight:700; margin:6px 0 18px; line-height:1.45;}
  .opts{display:grid; gap:12px;}
  .opt{
    text-align:left; border:2px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:14px; padding:15px 16px; font-size:1.05rem; cursor:pointer; transition:.12s;
  }
  .opt:hover{border-color:var(--accent); background:var(--accent-soft);}
  .opt.correct{border-color:var(--good); background:var(--good-bg); color:#0f7a39;}
  .opt.wrong{border-color:var(--bad); background:var(--bad-bg); color:#b51d1d;}
  .opt:disabled{cursor:default;}
  .feedback{margin-top:16px; font-size:1.05rem; min-height:26px; font-weight:600;}
  .feedback.ok{color:var(--good);} .feedback.no{color:var(--bad);}
  .progress{height:10px; background:var(--line); border-radius:999px; overflow:hidden; margin:4px 0 16px;}
  .progress > i{display:block; height:100%; background:var(--accent); width:0; transition:width .3s;}

  .speak{
    border:1px solid var(--line); background:var(--card); border-radius:12px; padding:8px 12px;
    cursor:pointer; font-size:.95rem; display:inline-flex; gap:7px; align-items:center; color:var(--ink);
  }
  .speak:hover{background:var(--accent-soft);}

  .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .spacer{flex:1;}
  .muted{color:var(--muted);}
  .big-num{font-size:2.6rem; font-weight:800; letter-spacing:.02em;}
  .counter-dots{display:flex; gap:8px; margin:10px 0;}
  .counter-dots span{width:20px; height:20px; border-radius:50%; background:var(--line);}
  .counter-dots span.on{background:var(--good);}

  /* exercises */
  .ex{display:flex; gap:14px; padding:14px 0; border-bottom:1px solid var(--line); align-items:flex-start;}
  .ex:last-child{border-bottom:none;}
  .ex .n{font-size:1.6rem; width:40px; text-align:center;}
  .ex h4{margin:0 0 3px;}
  .ex p{margin:0; color:var(--muted); font-size:.92rem;}
  .tag{display:inline-block; font-size:.72rem; background:var(--accent-soft); color:var(--accent);
       padding:2px 8px; border-radius:999px; font-weight:700; margin-left:6px;}

  .toggle{display:inline-flex; align-items:center; gap:8px; font-size:.85rem; color:var(--muted); cursor:pointer;}
  .switch{width:40px; height:22px; background:var(--line); border-radius:999px; position:relative; transition:.2s;}
  .switch i{position:absolute; top:2px; left:2px; width:18px; height:18px; background:#fff; border-radius:50%; transition:.2s;}
  .toggle.on .switch{background:var(--accent);}
  .toggle.on .switch i{left:20px;}

  .hidden{display:none !important;}
  .center{text-align:center;}
  .streak{font-weight:800; color:var(--accent);}
  .celebrate{font-size:3rem; text-align:center; margin:10px 0;}
  .star-row{font-size:1.4rem; letter-spacing:4px; text-align:center;}
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ HOME / PROFILE PICKER ============ -->
  <section id="view-home">
    <div class="center" style="margin-top:24px">
      <div style="font-size:3rem">☀️📚</div>
      <h1 style="margin:8px 0 2px">Scuola d'Estate</h1>
      <p class="muted">Un po' ogni giorno: matematica, storia, scienze e movimento.</p>
    </div>
    <div class="profiles">
      <div class="profile pf-blu" onclick="chooseProfile('blu')">
        <div class="ava">🦋</div>
        <h3>Blu</h3>
        <p>12 anni · 2ª media</p>
      </div>
      <div class="profile pf-oli" onclick="chooseProfile('oli')">
        <div class="ava">⚽</div>
        <h3 id="oliName">Oli</h3>
        <p>10 anni · 1ª media</p>
      </div>
    </div>
    <p class="center muted" style="margin-top:26px; font-size:.8rem">
      Suggerimento: salva questa pagina nei preferiti del telefono per aprirla ogni mattina.
    </p>
  </section>

  <!-- ============ DASHBOARD ============ -->
  <section id="view-dash" class="hidden">
    <header class="topbar">
      <button class="btn ghost small" onclick="goHome()">← Cambia</button>
      <h1 id="dashTitle">Ciao!</h1>
      <span class="pill">🔥 Serie: <span class="streak" id="streakNum">0</span></span>
    </header>

    <div class="card" id="welcomeCard">
      <div class="row">
        <div style="flex:1; min-width:200px">
          <h2 id="welcomeMsg" style="margin:0 0 4px">Pronto per oggi?</h2>
          <p class="muted" id="dateLine" style="margin:0"></p>
        </div>
        <label class="toggle" id="dysToggle" onclick="toggleDys()">
          <span>Testo facile</span><span class="switch"><i></i></span>
        </label>
      </div>
    </div>

    <div class="tiles" id="tiles"></div>
  </section>

  <!-- ============ ACTIVITY VIEW ============ -->
  <section id="view-act" class="hidden">
    <header class="topbar">
      <button class="btn ghost small" onclick="backToDash()">← Indietro</button>
      <h1 id="actTitle">Attività</h1>
    </header>
    <div id="actBody"></div>
  </section>

</div>

<script>
/* ============================================================
   DATA / STATE
   ============================================================ */
const TODAY = new Date();
const todayKey = TODAY.toISOString().slice(0,10);
const ITDAYS = ["domenica","lunedì","martedì","mercoledì","giovedì","venerdì","sabato"];
const ITMON = ["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];

let current = null; // 'blu' | 'oli'

function store(){ try{return JSON.parse(localStorage.getItem('scuolaEstate')||'{}');}catch(e){return {};} }
function save(d){ localStorage.setItem('scuolaEstate', JSON.stringify(d)); }
function pdata(p){
  const d = store();
  d[p] = d[p] || {streak:0, lastDay:null, days:{}, dys:(p==='blu')};
  return d[p];
}
function setPdata(p, obj){ const d=store(); d[p]=obj; save(d); }
function today(p){
  const o = pdata(p);
  o.days[todayKey] = o.days[todayKey] || {};
  return o;
}

/* deterministic daily seed so "questions of the day" stay stable per day */
function seedFromString(s){ let h=2166136261; for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);} return (h>>>0); }
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function rng(tag){ return mulberry32(seedFromString(todayKey+'|'+current+'|'+tag)); }
function pick(arr,r){ return arr[Math.floor(r()*arr.length)]; }
function shuffle(arr,r){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

/* ============================================================
   READ ALOUD (Italian)
   ============================================================ */
function speak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='it-IT'; u.rate=0.92;
  const v = window.speechSynthesis.getVoices().find(v=>v.lang && v.lang.toLowerCase().startsWith('it'));
  if(v) u.voice=v;
  window.speechSynthesis.speak(u);
}
if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged=()=>{}; }

/* ============================================================
   MATH QUESTION GENERATORS  (QCM = multiple choice)
   ============================================================ */
function mcq(question, correct, distractors, opts={}){
  return {type:'mcq', question, correct:String(correct),
          options: distractors.concat([String(correct)]), spoken: opts.spoken||question};
}
function nearbyWrong(correct, r, spread=8){
  const set=new Set(); let guard=0;
  while(set.size<3 && guard<50){
    guard++;
    let d = correct + (Math.floor(r()*spread*2)-spread);
    if(d===correct || d<0) d = correct + (set.size+1);
    if(d!==correct) set.add(d);
  }
  return [...set].map(String);
}

/* difficulty helpers: d goes 1..100, exercises scale from easy to hard */
function ri(r,min,max){ if(max<min)max=min; return min+Math.floor(r()*(max-min+1)); }
function fmtN(x){ return Number.isInteger(x)?x:Math.round(x*100)/100; }
function lvlMax(d,easy,hard){ d=d||1; return Math.max(easy, Math.round(easy+(hard-easy)*Math.min(1,d/100))); }

/* Blu: MULTIPLICATION — grows from tiny tables to 2-digit products */
function genMultiplication(r,d){
  d=d||1; let a,b;
  if(d<=70){ const m=Math.min(12, 9+Math.floor(d/12)); a=ri(r,2,m); b=ri(r,2,m); }  // full tables from the start, grow to ×12
  else if(d<=88){ a=ri(r,11,19); b=ri(r,2,9); }
  else { a=ri(r,12,25); b=ri(r,11,20); }
  const c=a*b;
  return mcq(`Quanto fa ${a} × ${b} ?`, c, nearbyWrong(c,r,Math.max(8,Math.round(c*0.15))), {spoken:`Quanto fa ${a} per ${b}?`});
}
/* Blu: mixed — division, %, addition, (later) subtraction; numbers grow with d */
function genBluMixed(r,d){
  d=d||1;
  const kind=Math.floor(r()*(d>40?4:3));
  if(kind===0){ const m=Math.min(12,8+Math.floor(d/12)); const b=ri(r,2,m), c=ri(r,2,m), a=b*c;
    return mcq(`Quanto fa ${a} ÷ ${b} ?`, c, nearbyWrong(c,r,5), {spoken:`Quanto fa ${a} diviso ${b}?`}); }
  if(kind===1){ const base=pick(d<30?[10,20,50,100]:[20,40,60,80,120,200],r); const pct=pick(d<30?[10,50]:[10,25,50,75],r);
    const c=fmtN(base*pct/100); return mcq(`Quanto è il ${pct}% di ${base} ?`, c, nearbyWrong(Math.round(c),r,Math.max(4,Math.round(base/4))),
      {spoken:`Quanto è il ${pct} per cento di ${base}?`}); }
  if(kind===2){ const hi=lvlMax(d,30,99); const a=ri(r,11,hi), b=ri(r,11,hi), c=a+b;
    return mcq(`Quanto fa ${a} + ${b} ?`, c, nearbyWrong(c,r,7)); }
  const hi=lvlMax(d,40,99); const a=ri(r,20,hi), b=ri(r,5,a-1), c=a-b;
  return mcq(`Quanto fa ${a} − ${b} ?`, c, nearbyWrong(c,r,7));
}
/* Leo (1a media): more question types unlock and numbers grow with d */
function genLeoMath(r,d){
  d=d||1;
  const kinds = d<25?4 : d<60?6 : 7;
  const kind=Math.floor(r()*kinds);
  if(kind===0){ const m=lvlMax(d,11,30); const a=ri(r,2,m), b=ri(r,2,m), c=a*b;
    return mcq(`${a} × ${b} = ?`, c, nearbyWrong(c,r,Math.max(10,Math.round(c*0.15)))); }
  if(kind===1){ const m=lvlMax(d,11,16); const b=ri(r,2,m), c=ri(r,2,m), a=b*c;
    return mcq(`${a} ÷ ${b} = ?`, c, nearbyWrong(c,r,6), {spoken:`${a} diviso ${b}?`}); }
  if(kind===2){ const base=pick(d<40?[20,40,60,80]:[120,200,250,400,500],r), pct=pick([10,25,50,75],r);
    const c=fmtN(base*pct/100); return mcq(`Quanto è il ${pct}% di ${base}?`, c, nearbyWrong(Math.round(c),r,Math.round(base/4)),
      {spoken:`Quanto è il ${pct} per cento di ${base}?`}); }
  if(kind===3){ const l=ri(r,3,lvlMax(d,11,25)), w=ri(r,2,lvlMax(d,8,18));
    if(r()<0.5){ const c=l*w; return mcq(`Rettangolo ${l} cm × ${w} cm: qual è l'AREA? (cm²)`, c, nearbyWrong(c,r,10),
        {spoken:`Rettangolo di base ${l} e altezza ${w}: qual è l'area?`}); }
    const c=2*(l+w); return mcq(`Rettangolo ${l} cm × ${w} cm: qual è il PERIMETRO? (cm)`, c, nearbyWrong(c,r,8),
        {spoken:`Rettangolo di base ${l} e altezza ${w}: qual è il perimetro?`}); }
  if(kind===4){ const a=ri(r,1,50)/10, b=ri(r,1,50)/10, c=Math.round((a+b)*10)/10;
    const ws=[c+0.1,c-0.1,Math.round((c+1)*10)/10].map(x=>String(Math.round(x*10)/10));
    return mcq(`${a.toFixed(1)} + ${b.toFixed(1)} = ?`, c.toFixed(1), ws); }
  if(kind===5){ const den=pick([2,3,4,5],r), k=ri(r,2,8), N=den*k, num=ri(r,1,den-1), c=(N/den)*num;
    return mcq(`Quanto sono i ${num}/${den} di ${N}?`, c, nearbyWrong(c,r,Math.max(4,Math.round(c*0.3)+1))); }
  const a=ri(r,2,9), b=ri(r,2,9), cc=ri(r,2,9), res=a+b*cc;
  return mcq(`${a} + ${b} × ${cc} = ?  (prima la moltiplicazione)`, res, nearbyWrong(res,r,10));
}

/* ============================================================
   STEP-BY-STEP PROBLEM GENERATORS
   each returns {prompt, steps:[in correct order], decoys:[wrong moves]}
   ============================================================ */
// ---- Blu (gentle, builds automaticity) — scales with d ----
function sB_orderOps(r,d){ const a=ri(r,2,lvlMax(d,9,40)),b=ri(r,2,lvlMax(d,6,9)),c=ri(r,2,lvlMax(d,6,9)),p=b*c,res=a+p;
  return {prompt:`Risolvi:  ${a} + ${b} × ${c}`,
    steps:[`Prima la moltiplicazione: ${b} × ${c} = ${p}`,`Poi l'addizione: ${a} + ${p} = ${res}`,`Risultato: ${res}`],
    decoys:[`Faccio prima l'addizione: ${a} + ${b} = ${a+b}`,`Sommo tutto: ${a}+${b}+${c} = ${a+b+c}`]}; }
function sB_oneStep(r,d){ const a=ri(r,2,lvlMax(d,9,40)),x=ri(r,2,lvlMax(d,9,40)),b=a+x;
  return {prompt:`Trova x:   x + ${a} = ${b}`,
    steps:[`Tolgo ${a} da tutti e due i lati`,`x = ${b} − ${a}`,`x = ${x}`],
    decoys:[`x = ${b} + ${a} = ${b+a}`,`Moltiplico: x = ${b} × ${a}`]}; }
function sB_mulEq(r,d){ const a=ri(r,2,lvlMax(d,9,12)),x=ri(r,2,lvlMax(d,9,15)),b=a*x;
  return {prompt:`Trova x:   ${a} · x = ${b}`,
    steps:[`Divido tutti e due i lati per ${a}`,`x = ${b} ÷ ${a}`,`x = ${x}`],
    decoys:[`x = ${b} × ${a} = ${b*a}`,`x = ${b} − ${a} = ${b-a}`]}; }
function sB_percent(r,d){ const N=pick(d<30?[20,40,50,100]:[40,60,80,120,200,400],r),p=pick([10,25,50],r),one=N/100,res=fmtN(N*p/100);
  return {prompt:`Quanto è il ${p}% di ${N}?`,
    steps:[`Trovo l'1%: ${N} ÷ 100 = ${fmtN(one)}`,`Moltiplico per ${p}: ${fmtN(one)} × ${p}`,`Risultato: ${res}`],
    decoys:[`Faccio ${N} × ${p} = ${N*p}`,`Faccio ${N} ÷ ${p}`]}; }
function sB_word(r,d){ const price=ri(r,2,lvlMax(d,5,12)),qty=ri(r,2,lvlMax(d,4,6)),cost=price*qty,paid=Math.floor(cost/10)*10+10,change=paid-cost;
  return {prompt:`Compri ${qty} quaderni da €${price} l'uno e paghi con €${paid}. Quanto ti danno di resto?`,
    steps:[`Quanto spendo: ${qty} × ${price} = ${cost}`,`Il resto: ${paid} − ${cost} = ${change}`,`Resto: €${change}`],
    decoys:[`Sommo: ${qty} + ${price} = ${qty+price}`,`Faccio ${paid} + ${cost} = ${paid+cost}`]}; }

// ---- Oli (1a media) — scales with d ----
function sL_paren(r,d){ const a=ri(r,2,lvlMax(d,9,40)),b=ri(r,2,lvlMax(d,9,40)),c=ri(r,2,lvlMax(d,6,12)),s=a+b,res=s*c;
  return {prompt:`Risolvi:  (${a} + ${b}) × ${c}`,
    steps:[`Prima la parentesi: (${a} + ${b}) = ${s}`,`Poi moltiplico: ${s} × ${c} = ${res}`,`Risultato: ${res}`],
    decoys:[`Moltiplico subito: ${b} × ${c} = ${b*c}`,`Sommo tutto: ${a}+${b}+${c} = ${a+b+c}`]}; }
function sL_twoStep(r,d){ const a=ri(r,2,lvlMax(d,5,12)),x=ri(r,2,lvlMax(d,9,20)),b=ri(r,1,lvlMax(d,9,30)),c=a*x+b;
  return {prompt:`Trova x:   ${a}x + ${b} = ${c}`,
    steps:[`Tolgo ${b}: ${a}x = ${c} − ${b} = ${c-b}`,`Divido per ${a}: x = ${c-b} ÷ ${a}`,`x = ${x}`],
    decoys:[`Divido subito per ${a}: x = ${c} ÷ ${a}`,`Sommo ${b}: ${a}x = ${c} + ${b} = ${c+b}`]}; }
function sL_area(r,d){ const l=ri(r,4,lvlMax(d,12,40)),w=ri(r,3,lvlMax(d,9,25)),res=l*w;
  return {prompt:`Un rettangolo ha base ${l} cm e altezza ${w} cm. Trova l'AREA.`,
    steps:[`L'area = base × altezza`,`= ${l} × ${w}`,`= ${res} cm²`],
    decoys:[`Sommo i lati: ${l} + ${w} = ${l+w}`,`Perimetro: 2 × (${l}+${w}) = ${2*(l+w)}`]}; }
function sL_frac(r,d){ const den=pick([2,3,4,5],r),k=ri(r,2,lvlMax(d,6,15)),N=den*k,n=ri(r,1,den-1),res=(N/den)*n;
  return {prompt:`Quanto sono i ${n}/${den} di ${N}?`,
    steps:[`Divido per il denominatore: ${N} ÷ ${den} = ${N/den}`,`Moltiplico per il numeratore: ${N/den} × ${n} = ${res}`,`Risultato: ${res}`],
    decoys:[`Faccio ${N} × ${n} = ${N*n}`,`Faccio ${N} ÷ ${n}`]}; }
function sL_percent(r,d){ const N=pick(d<40?[40,60,80,120]:[200,400,500,800,1000],r),p=pick([10,25,50,75],r),one=N/100,res=fmtN(N*p/100);
  return {prompt:`Quanto è il ${p}% di ${N}?`,
    steps:[`Trovo l'1%: ${N} ÷ 100 = ${fmtN(one)}`,`Moltiplico per ${p}: ${fmtN(one)} × ${p}`,`Risultato: ${res}`],
    decoys:[`Faccio ${N} × ${p} = ${N*p}`,`Faccio ${N} ÷ ${p}`]}; }

function genStepsProblem(p, r, d){
  const pool = (p==='blu') ? [sB_orderOps,sB_oneStep,sB_mulEq,sB_percent,sB_word]
                           : [sL_paren,sL_twoStep,sL_area,sL_frac,sL_percent];
  return pick(pool, r)(r, d);
}

/* ============================================================
   VIEW ROUTING
   ============================================================ */
function show(id){ ['view-home','view-dash','view-act'].forEach(v=>document.getElementById(v).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.scrollTo(0,0); }
function goHome(){ current=null; show('view-home'); }
function backToDash(){ window.speechSynthesis && window.speechSynthesis.cancel(); openDash(); }

function chooseProfile(p){
  current=p;
  document.body.classList.remove('blu','oli'); document.body.classList.add(p);
  const o=pdata(p);
  document.body.classList.toggle('dys', !!o.dys);
  openDash();
}

function streakUpdate(p){
  const o=pdata(p);
  // count a "completed day" if any activity done; update streak on first activity of the day
  if(o.lastDay!==todayKey && o.days[todayKey] && Object.keys(o.days[todayKey]).length){
    const y=new Date(TODAY); y.setDate(y.getDate()-1);
    const yKey=y.toISOString().slice(0,10);
    o.streak = (o.lastDay===yKey) ? (o.streak+1) : 1;
    o.lastDay=todayKey;
    setPdata(p,o);
  }
  return o.streak;
}

/* ---- 100-level progression: +1 (=1%) per activity, once per day ---- */
function awardLevel(actId){
  const a=activities(current).find(x=>x.id===actId); if(!a) return 0;
  const rec=todayRec(actId);
  const o=pdata(current); o.levels=o.levels||{}; o.leveledDays=o.leveledDays||{};
  if(isActivityDone(a,rec) && (o.levels[actId]||0)<100 && o.leveledDays[actId]!==todayKey){
    o.levels[actId]=(o.levels[actId]||0)+1; o.leveledDays[actId]=todayKey; setPdata(current,o);
  }
  return o.levels[actId]||0;
}
function levelOf(actId){ const o=pdata(current); return (o.levels&&o.levels[actId])||0; }

function openDash(){
  const p=current; const o=today(p);
  setPdata(p,o);
  show('view-dash');
  const name = p==='blu'?'Blu':'Oli';
  document.getElementById('dashTitle').textContent = 'Ciao '+name+'!';
  document.getElementById('streakNum').textContent = o.streak||0;
  const actsAll=activities(p);
  let lvlSum=0; actsAll.forEach(a=>lvlSum+=((o.levels&&o.levels[a.id])||0));
  const overall=Math.round(lvlSum/actsAll.length);
  document.getElementById('dateLine').innerHTML =
    ITDAYS[TODAY.getDay()]+' '+TODAY.getDate()+' '+ITMON[TODAY.getMonth()]
    +' &nbsp;·&nbsp; 📈 Progresso totale <b>'+overall+'%</b>';
  const msgs = p==='blu'
    ? ['Andiamo al tuo ritmo. Ce la fai benissimo! 💜','Ogni giorno un piccolo passo. Sei in gamba!','Pronta? Iniziamo con calma.']
    : ['Forza campione, in campo! ⚽','Allenamento del cervello e del corpo!','Pronto a segnare oggi?'];
  document.getElementById('welcomeMsg').textContent = pick(msgs, mulberry32(seedFromString(todayKey+p)));
  // dys toggle state
  document.getElementById('dysToggle').classList.toggle('on', !!pdata(p).dys);

  // tiles
  const tilesEl=document.getElementById('tiles'); tilesEl.innerHTML='';
  activities(p).forEach(a=>{
    const dayrec = o.days[todayKey][a.id] || {};
    const done = isActivityDone(a, dayrec);
    let sub = a.desc;
    if(a.id==='mult'){ const c=dayrec.correct||0; sub = `Fatte oggi: ${c} / ${a.minDone}+ ✖️`; }
    const el=document.createElement('div');
    el.className='tile'+(done?' done':'');
    el.onclick=()=>openActivity(a.id);
    const lvl=(o.levels&&o.levels[a.id])||0;
    el.innerHTML=`<span class="done-badge">✓ fatto</span>
      <div class="ico">${a.ico}</div><h3>${a.name}</h3><p>${sub}</p>
      <div class="lvl-row"><div class="lvl-bar"><i style="width:${lvl}%"></i></div><span class="lvl-num">${lvl}% · Liv. ${lvl}/100</span></div>`;
    tilesEl.appendChild(el);
  });
}
function isActivityDone(a, rec){
  if(a.kind==='pe') return !!rec.done;
  if(a.minDone) return (rec.correct||0) >= a.minDone;
  return !!rec.done;
}

/* ============================================================
   ACTIVITY RUNNER
   ============================================================ */
let session=null;
function openActivity(id){
  const p=current;
  const a=activities(p).find(x=>x.id===id);
  document.getElementById('actTitle').textContent=a.name;
  if(a.kind==='pe'){ renderPE(p); return; }
  if(a.kind==='write'){ renderWriteHome(); return; }
  if(a.kind==='steps'){ startSteps(); return; }
  // build fresh questions EVERY time (different on each attempt), scaled to the current level
  const r=mulberry32((Math.random()*1e9)|0);
  const d=Math.min(100, levelOf(id)+1);
  const qs=[];
  if(a.gen){
    const seen=new Set(); let guard=0;
    while(qs.length<a.count && guard<a.count*60){
      guard++;
      const q=a.gen(r,d);
      if(seen.has(q.question)) continue;          // no repeats in the same round
      seen.add(q.question); q.options=shuffle(q.options,r); qs.push(q);
    }
    while(qs.length<a.count){ const q=a.gen(r,d); q.options=shuffle(q.options,r); qs.push(q); } // tiny-pool fallback
  } else {
    // history / science: pick distinct questions, no repeats within the round
    const items=shuffle(BANKS[a.bank], r).slice(0, Math.min(a.count, BANKS[a.bank].length));
    items.forEach(item=>qs.push({type:'mcq', question:item.q, correct:item.a,
      options:shuffle(item.d.concat([item.a]), r), spoken:item.q, explain:item.e||''}));
  }
  session={a, qs, idx:0, correct:0, answered:false, readOn: a.readDefault || pdata(p).dys};
  show('view-act');
  renderQ();
}

function renderQ(){
  const {a,qs,idx}=session;
  const q=qs[idx];
  const body=document.getElementById('actBody');
  const showSpeak = ('speechSynthesis' in window);
  let mult = (a.id==='mult');
  body.innerHTML=`
    <div class="card readzone">
      <div class="row" style="margin-bottom:6px">
        <span class="muted">Domanda ${idx+1} di ${qs.length}</span>
        <span class="spacer"></span>
        ${showSpeak?`<button class="speak" id="speakBtn">🔊 Ascolta</button>`:''}
      </div>
      <div class="progress"><i style="width:${(idx/qs.length)*100}%"></i></div>
      ${mult?`<div class="counter-dots" id="dots"></div>`:''}
      <div class="q-text">${q.question}</div>
      <div class="opts" id="opts"></div>
      <div class="feedback" id="fb"></div>
      <div class="row" style="margin-top:14px">
        <span class="spacer"></span>
        <button class="btn hidden" id="nextBtn">Avanti →</button>
      </div>
    </div>`;
  const optsEl=document.getElementById('opts');
  q.options.forEach(opt=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=opt;
    b.onclick=()=>answer(b, opt, q);
    optsEl.appendChild(b);
  });
  if(showSpeak) document.getElementById('speakBtn').onclick=()=>speak(q.spoken||q.question);
  if(mult) drawDots();
  session.answered=false;
  // auto read-aloud for Blu / when readOn
  if(session.readOn && showSpeak){ setTimeout(()=>speak(q.spoken||q.question), 250); }
}

function drawDots(){
  const p=current; const rec=todayRec('mult'); const c=rec.correct||0;
  const need=session.a.minDone;
  const el=document.getElementById('dots'); if(!el) return;
  el.innerHTML='';
  for(let i=0;i<need;i++){ const s=document.createElement('span'); if(i<c)s.className='on'; el.appendChild(s); }
}

function todayRec(id){
  const o=today(current); o.days[todayKey][id]=o.days[todayKey][id]||{}; setPdata(current,o);
  return o.days[todayKey][id];
}

const PRAISE_BLU=["Bravissima! 💜","Perfetto, continua così!","Esatto! Sei un genio!","Sì! Che bello!","Giusto! Ottimo lavoro!"];
const PRAISE_LEO=["Goool! ⚽","Esatto, grande!","Bravo campione!","Perfetto!","Centro! Continua così!"];
const RETRY_BLU=["Quasi! Riprova con calma, ci sei quasi. 💪","Non fa niente, riprova: ce la fai!","Tranquilla, sbagliando si impara. Riprova!"];
const RETRY_LEO=["Quasi! Riprova.","Non c'è problema, riprova!","Ci sei quasi, riprova!"];

function answer(btn, opt, q){
  if(session.answered) return;
  const correct = (opt===q.correct);
  const fb=document.getElementById('fb');
  const r=mulberry32(seedFromString(todayKey+current+session.idx+opt));
  if(correct){
    session.answered=true;
    btn.classList.add('correct');
    document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
    fb.className='feedback ok';
    fb.textContent = pick(current==='blu'?PRAISE_BLU:PRAISE_LEO, r);
    session.correct++;
    // record progress
    const rec=todayRec(session.a.id);
    rec.correct=(rec.correct||0)+1;
    setRec(session.a.id, rec);
    if(session.a.id==='mult') drawDots();
    awardLevel(session.a.id);
    document.getElementById('nextBtn').classList.remove('hidden');
    document.getElementById('nextBtn').onclick=nextQ;
    if(session.readOn) speak(current==='blu'?'Bravissima!':'Esatto!');
  } else if(session.a.bank){
    // History / Science: reveal the correct answer + short explanation
    session.answered=true;
    btn.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(b=>{
      b.disabled=true;
      if(b.textContent===q.correct) b.classList.add('correct');
    });
    fb.className='feedback no';
    fb.innerHTML = `Quasi! La risposta giusta è <b>${q.correct}</b>.`
      + (q.explain?`<div style="margin-top:8px; font-weight:500; color:var(--ink)">💡 ${q.explain}</div>`:'');
    document.getElementById('nextBtn').classList.remove('hidden');
    document.getElementById('nextBtn').onclick=nextQ;
    if(session.readOn) speak('La risposta giusta è ' + q.correct + '. ' + (q.explain||''));
  } else {
    // Math: DSA-friendly, no penalty, allow retry
    btn.classList.add('wrong'); btn.disabled=true;
    fb.className='feedback no';
    fb.textContent = pick(current==='blu'?RETRY_BLU:RETRY_LEO, r);
  }
}
function setRec(id, rec){ const o=today(current); o.days[todayKey][id]=rec; setPdata(current,o); }

function nextQ(){
  window.speechSynthesis && window.speechSynthesis.cancel();
  session.idx++;
  if(session.idx>=session.qs.length){ finishQuiz(); return; }
  renderQ();
}

function finishQuiz(){
  const a=session.a;
  const rec=todayRec(a.id); rec.done=true; setRec(a.id, rec);
  streakUpdate(current);
  const lvl=awardLevel(a.id);
  const body=document.getElementById('actBody');
  const score=session.correct, total=session.qs.length;
  let stars = score>=total?'⭐⭐⭐' : score>=Math.ceil(total*0.6)?'⭐⭐':'⭐';
  const msg = current==='blu'
    ? "Hai finito! Sono fierissimo di te. 💜"
    : "Allenamento del cervello completato! 💪";
  body.innerHTML=`<div class="card center readzone">
      <div class="celebrate">🎉</div>
      <div class="star-row">${stars}</div>
      <h2>${msg}</h2>
      <p class="muted">Risposte giuste: ${score} su ${total}</p>
      <p class="streak" style="font-size:1.05rem">📈 ${a.name}: Livello ${lvl}/100 (${lvl}%)</p>
      <div class="row" style="justify-content:center; margin-top:14px">
        <button class="btn ghost" onclick="openActivity('${a.id}')">↻ Ancora</button>
        <button class="btn" onclick="backToDash()">Torna al menu</button>
      </div>
    </div>`;
  if(session.readOn) speak(current==='blu'?'Hai finito! Sono fierissimo di te.':'Completato! Grande campione!');
}

/* ============================================================
   STEP-BY-STEP PROBLEMS — ordering + next-step
   ============================================================ */
let stepS=null;
function startSteps(){
  const r=mulberry32((Math.random()*1e9)|0);   // fresh each time, for variety/reps
  const d=Math.min(100, levelOf('steps')+1);
  const N=4, probs=[]; const seen=new Set(); let guard=0;
  while(probs.length<N && guard<N*60){ guard++; const q=genStepsProblem(current,r,d); if(seen.has(q.prompt))continue; seen.add(q.prompt); probs.push(q); }
  while(probs.length<N) probs.push(genStepsProblem(current,r,d));
  stepS={probs, idx:0, r};
  show('view-act');
  renderStep();
}
function stepHead(){
  const sp=('speechSynthesis' in window);
  return `<div class="row" style="margin-bottom:6px">
      <span class="muted">Problema ${stepS.idx+1} di ${stepS.probs.length}</span>
      <span class="spacer"></span>
      ${sp?`<button class="speak" id="spk">🔊 Ascolta</button>`:''}
    </div>
    <div class="progress"><i style="width:${(stepS.idx/stepS.probs.length)*100}%"></i></div>`;
}
function bindSpeak(prob){
  const b=document.getElementById('spk'); if(b) b.onclick=()=>speak(prob.prompt);
}
function renderStep(){
  const prob=stepS.probs[stepS.idx];
  stepS.mode = (stepS.idx % 2 === 0) ? 'order' : 'next';
  if(stepS.mode==='order'){ stepS.pool=shuffle(prob.steps.map((s,i)=>i), stepS.r); stepS.ans=[]; drawOrder(prob); }
  else { stepS.k=0; drawNext(prob); }
  if(current==='blu') setTimeout(()=>speak(prob.prompt), 300); // auto read-aloud for Blu
}

/* ----- Mode 1: metti in ordine ----- */
function drawOrder(prob){
  const ready = stepS.ans.length===prob.steps.length;
  const ansBtns = stepS.ans.length
    ? stepS.ans.map((i,pos)=>`<button class="opt step-ans" data-pos="${pos}" style="border-color:var(--accent);background:var(--accent-soft)"><b>${pos+1}.</b> ${prob.steps[i]}</button>`).join('')
    : `<p class="muted" style="margin:6px 0">Tocca i passaggi nell'ordine giusto…</p>`;
  const poolBtns = stepS.pool.map(i=>`<button class="opt step-pool" data-i="${i}">${prob.steps[i]}</button>`).join('')
    || `<p class="muted" style="margin:6px 0">(tutti scelti)</p>`;
  document.getElementById('actBody').innerHTML=`<div class="card readzone">
    ${stepHead()}
    <div class="q-text" style="font-size:1.12rem">🧩 Metti i passaggi in ordine</div>
    <p style="font-size:1.15rem"><b>${prob.prompt}</b></p>
    <div class="muted" style="font-size:.82rem;font-weight:700;margin-top:6px">La tua soluzione:</div>
    <div class="opts" style="margin:6px 0">${ansBtns}</div>
    <div class="muted" style="font-size:.82rem;font-weight:700;margin-top:8px">Passaggi da sistemare:</div>
    <div class="opts" style="margin:6px 0">${poolBtns}</div>
    <div class="feedback" id="fb"></div>
    <div class="row" style="margin-top:12px">
      <button class="btn ghost small" onclick="renderStep()">↺ Ricomincia</button>
      <span class="spacer"></span>
      <button class="btn" id="checkBtn" ${ready?'':'disabled style="opacity:.45"'}>Controlla ✓</button>
    </div></div>`;
  bindSpeak(prob);
  document.querySelectorAll('.step-pool').forEach(b=>b.onclick=()=>{ const i=+b.dataset.i; stepS.ans.push(i); stepS.pool=stepS.pool.filter(x=>x!==i); drawOrder(prob); });
  document.querySelectorAll('.step-ans').forEach(b=>b.onclick=()=>{ const pos=+b.dataset.pos; stepS.pool.push(stepS.ans[pos]); stepS.ans.splice(pos,1); drawOrder(prob); });
  if(ready) document.getElementById('checkBtn').onclick=()=>checkOrder(prob);
}
function checkOrder(prob){
  const fb=document.getElementById('fb');
  const correct = stepS.ans.every((i,pos)=>i===pos);
  if(correct){
    document.querySelectorAll('.step-ans').forEach(b=>{b.style.borderColor='var(--good)';b.style.background='var(--good-bg)';});
    fb.className='feedback ok'; fb.textContent=pick(current==='blu'?PRAISE_BLU:PRAISE_LEO, stepS.r);
    document.getElementById('checkBtn').outerHTML='<button class="btn" onclick="nextStep()">Avanti →</button>';
    if(current==='blu') speak('Bravissima!');
  } else {
    fb.className='feedback no';
    fb.textContent = current==='blu' ? 'Quasi! Controlla l\'ordine con calma e riprova. 💪' : 'Quasi! Controlla l\'ordine e riprova.';
  }
}

/* ----- Mode 2: qual è il prossimo passo ----- */
function drawNext(prob){
  const k=stepS.k;
  const done = prob.steps.slice(0,k).map((s,i)=>`<button class="opt" disabled style="border-color:var(--good);background:var(--good-bg);color:#0f7a39"><b>${i+1}.</b> ${s}</button>`).join('')
    || `<p class="muted" style="margin:4px 0">(ancora niente — scegli il primo passo!)</p>`;
  let cands = shuffle(prob.steps.slice(k+1).concat(prob.decoys), stepS.r).slice(0,2);
  const opts = shuffle([prob.steps[k], ...cands], stepS.r);
  document.getElementById('actBody').innerHTML=`<div class="card readzone">
    ${stepHead()}
    <div class="q-text" style="font-size:1.12rem">🪜 Qual è il prossimo passo?</div>
    <p style="font-size:1.15rem"><b>${prob.prompt}</b></p>
    <div class="muted" style="font-size:.82rem;font-weight:700">Passaggi giusti finora:</div>
    <div class="opts" style="margin:6px 0">${done}</div>
    <div class="muted" style="font-size:.82rem;font-weight:700;margin-top:8px">Scegli il passo numero ${k+1}:</div>
    <div class="opts" style="margin:6px 0">${opts.map(o=>`<button class="opt nstep">${o}</button>`).join('')}</div>
    <div class="feedback" id="fb"></div>
  </div>`;
  bindSpeak(prob);
  document.querySelectorAll('.nstep').forEach(b=>b.onclick=()=>answerNext(b, b.textContent, prob));
}
function answerNext(btn, val, prob){
  const fb=document.getElementById('fb');
  if(val===prob.steps[stepS.k]){
    btn.classList.add('correct');
    document.querySelectorAll('.nstep').forEach(x=>x.disabled=true);
    fb.className='feedback ok'; fb.textContent=pick(current==='blu'?PRAISE_BLU:PRAISE_LEO, stepS.r);
    stepS.k++;
    const last = stepS.k>=prob.steps.length;
    if(current==='blu') speak(last?'Hai risolto!':'Esatto!');
    if(last){
      fb.insertAdjacentHTML('afterend','<div class="row" style="margin-top:12px"><span class="spacer"></span><button class="btn" onclick="nextStep()">Avanti →</button></div>');
    } else {
      setTimeout(()=>drawNext(prob), 750);
    }
  } else {
    btn.classList.add('wrong'); btn.disabled=true;
    fb.className='feedback no'; fb.textContent=pick(current==='blu'?RETRY_BLU:RETRY_LEO, stepS.r);
  }
}
function nextStep(){
  window.speechSynthesis && window.speechSynthesis.cancel();
  stepS.idx++;
  if(stepS.idx>=stepS.probs.length){ finishSteps(); return; }
  renderStep();
}
function finishSteps(){
  const rec=todayRec('steps'); rec.done=true; setRec('steps',rec);
  streakUpdate(current);
  const lvl=awardLevel('steps');
  document.getElementById('actBody').innerHTML=`<div class="card center readzone">
    <div class="celebrate">🎉</div><div class="star-row">⭐⭐⭐</div>
    <h2>${current==='blu'?'Hai risolto tutti i problemi! Bravissima 💜':'Problemi risolti! Grande 💪'}</h2>
    <p class="streak" style="font-size:1.05rem">📈 Problemi passo-passo: Livello ${lvl}/100 (${lvl}%)</p>
    <p class="muted">Più ne fai, più diventa automatico. 🧠</p>
    <div class="row" style="justify-content:center;margin-top:14px">
      <button class="btn ghost" onclick="startSteps()">↻ Altri problemi</button>
      <button class="btn" onclick="backToDash()">Torna al menu</button>
    </div></div>`;
  if(current==='blu') speak('Hai risolto tutti i problemi! Bravissima.');
}

/* ---- Physical education view ---- */
function renderPE(p){
  const t=TRAINING[p];
  const rec=todayRec('pe');
  const body=document.getElementById('actBody');
  let rows=t.items.map(it=>`
    <div class="ex">
      <div class="n">${it.n}</div>
      <div><h4>${it.h}<span class="tag">${it.t}</span></h4><p>${it.p}</p></div>
    </div>`).join('');
  body.innerHTML=`
    <div class="card readzone">
      <h2 style="margin-top:0">${t.title}</h2>
      <p class="muted">${t.intro}</p>
      ${rows}
    </div>
    <div class="card center">
      <p style="margin:0 0 12px">${rec.done?'✅ Già fatto oggi — bravo/a!':'Hai completato la routine di oggi?'}</p>
      <button class="btn" onclick="markPE()">${rec.done?'Fatto di nuovo ✓':'Sì, fatto! 🎉'}</button>
    </div>`;
  show('view-act');
}
function markPE(){
  const rec=todayRec('pe'); rec.done=true; setRec('pe',rec);
  streakUpdate(current);
  const body=document.getElementById('actBody');
  body.innerHTML=`<div class="card center readzone">
      <div class="celebrate">🏅</div>
      <h2>${current==='blu'?'Che brava! Movimento fatto. 🌸':'Grande! Allenamento completato. ⚽'}</h2>
      <button class="btn" onclick="backToDash()" style="margin-top:10px">Torna al menu</button>
    </div>`;
}

/* ============================================================
   WRITING MODULE RENDERING
   ============================================================ */
function wChip(t){ return `<span style="display:inline-block;background:var(--accent-soft);color:var(--accent);border-radius:999px;padding:5px 11px;margin:4px 4px 0 0;font-size:.92rem;font-weight:600">${t}</span>`; }
function getDraft(id){ const o=pdata(current); return (o.writing&&o.writing[id])||''; }
function saveDraft(id,val){
  const o=pdata(current); o.writing=o.writing||{}; o.writing[id]=val; setPdata(current,o);
  if(val && val.trim().length>0){
    const rec=todayRec('write');
    if(!rec.done){ rec.done=true; setRec('write',rec); streakUpdate(current); awardLevel('write'); }
  }
}

function renderWriteHome(){
  document.getElementById('actTitle').textContent='✍️ Scrittura';
  let html=`<div class="card readzone">
    <h2 style="margin-top:0">Impara a scrivere bene 📚</h2>
    <p class="muted">Una scala di lezioni, dalle basi fino alle superiori. Ogni lezione ha: la <b>struttura</b>, le <b>parole utili</b>, un <b>esempio</b> e un <b>esercizio</b> da provare.</p>
    <button class="btn" onclick="renderToolkit()">🧰 Cassetta degli attrezzi</button>
  </div>`;
  WRITING.levels.forEach(lv=>{
    const ls=WRITING.lessons.filter(x=>x.lvl===lv.id);
    html+=`<div class="card"><h3 style="margin:0 0 2px">${lv.name}</h3>
      <p class="muted" style="margin:0 0 12px">${lv.note}</p><div class="tiles">`;
    ls.forEach(le=>{
      html+=`<div class="tile" onclick="renderWriteLesson('${le.id}')">
        <div class="ico">${le.ico}</div><h3 style="font-size:1.02rem">${le.title}</h3>
        <p>${le.obiettivo}</p></div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById('actBody').innerHTML=html;
  show('view-act');
}

function renderWriteLesson(id){
  const le=WRITING.lessons.find(x=>x.id===id);
  document.getElementById('actTitle').textContent=le.title;
  const sp=('speechSynthesis' in window);
  const parole = le.parole.map(grp=>
    `<div style="margin-bottom:12px"><div class="muted" style="font-size:.85rem;font-weight:700;margin-bottom:2px">${grp.g}</div>${grp.w.map(wChip).join('')}</div>`).join('');
  const struttura = `<ul style="line-height:1.8;margin:6px 0 0;padding-left:20px">${le.struttura.map(s=>`<li>${s}</li>`).join('')}</ul>`;
  const starters = le.prova.starters.length
    ? `<div style="margin:6px 0 10px">${le.prova.starters.map(s=>`<button type="button" class="starter speak" style="cursor:pointer">✏️ ${s}</button>`).join(' ')}</div>` : '';
  const checklist = le.checklist.map(c=>`<div class="chk" style="padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer">☐ ${c}</div>`).join('');

  document.getElementById('actBody').innerHTML=`
    <div class="card"><div class="row">
      <button class="btn ghost small" onclick="renderWriteHome()">← Lezioni</button>
      <span class="spacer"></span>
      ${sp?`<button class="speak" id="readLesson">🔊 Ascolta</button>`:''}
    </div></div>

    <div class="card readzone">
      <h3 style="margin-top:0">🎯 Obiettivo</h3><p>${le.obiettivo}</p>
      <h3>🏗️ La struttura</h3>${struttura}
    </div>

    <div class="card readzone">
      <h3 style="margin-top:0">🧰 Le parole utili</h3>${parole}
    </div>

    <div class="card readzone">
      <h3 style="margin-top:0">📌 Esempio</h3>
      <p style="white-space:pre-wrap;background:var(--accent-soft);padding:14px;border-radius:12px;margin:0">${le.esempio}</p>
      ${sp?`<button class="speak" id="readEx" style="margin-top:10px">🔊 Ascolta l'esempio</button>`:''}
    </div>

    <div class="card readzone">
      <h3 style="margin-top:0">✍️ Tocca a te</h3>
      <p><b>${le.prova.prompt}</b></p>
      ${starters}
      <textarea id="draft" rows="6" style="width:100%;border:2px solid var(--line);border-radius:12px;padding:12px;font-size:1.05rem;font-family:inherit" placeholder="Scrivi qui…"></textarea>
      <div class="muted" id="savedNote" style="font-size:.82rem;margin-top:6px">Si salva da solo sul dispositivo.</div>
    </div>

    <div class="card readzone">
      <h3 style="margin-top:0">✅ Checklist finale</h3>
      <p class="muted" style="margin-top:0">Tocca ogni punto quando l'hai controllato.</p>
      ${checklist}
    </div>

    <div class="card center">
      <button class="btn" onclick="renderWriteHome()">Torna alle lezioni</button>
    </div>`;

  if(sp){
    const rl=document.getElementById('readLesson'); if(rl) rl.onclick=()=>speak('Obiettivo. '+le.obiettivo+' La struttura. '+le.struttura.join('. '));
    const re=document.getElementById('readEx'); if(re) re.onclick=()=>speak(le.esempio);
  }
  const ta=document.getElementById('draft');
  ta.value=getDraft(le.id);
  ta.addEventListener('input',()=>{ saveDraft(le.id, ta.value); document.getElementById('savedNote').textContent='Salvato ✓'; });
  document.querySelectorAll('.starter').forEach(b=>b.addEventListener('click',()=>{
    const txt=b.textContent.replace('✏️ ','');
    ta.value=(ta.value?ta.value+'\n':'')+txt+' ';
    ta.focus(); saveDraft(le.id, ta.value);
  }));
  document.querySelectorAll('.chk').forEach(el=>el.addEventListener('click',()=>{
    const on=el.dataset.on==='1'; el.dataset.on=on?'0':'1';
    el.textContent=(on?'☐ ':'✅ ')+el.textContent.slice(2);
    el.style.color=on?'':'var(--good)';
  }));
  show('view-act');
}

function renderToolkit(){
  document.getElementById('actTitle').textContent='🧰 Cassetta degli attrezzi';
  let html=`<div class="card"><button class="btn ghost small" onclick="renderWriteHome()">← Lezioni</button></div>`;
  TOOLKIT.forEach(sec=>{
    html+=`<div class="card readzone"><h3 style="margin-top:0">${sec.ico} ${sec.title}</h3>`;
    sec.groups.forEach(g=>{ html+=`<div style="margin-bottom:12px"><div class="muted" style="font-weight:700;font-size:.85rem;margin-bottom:2px">${g.g}</div>${g.w.map(wChip).join('')}</div>`; });
    html+=`</div>`;
  });
  document.getElementById('actBody').innerHTML=html;
  show('view-act');
}

/* ---- dyslexia toggle ---- */
function toggleDys(){
  const o=pdata(current); o.dys=!o.dys; setPdata(current,o);
  document.body.classList.toggle('dys', o.dys);
  document.getElementById('dysToggle').classList.toggle('on', o.dys);
}
